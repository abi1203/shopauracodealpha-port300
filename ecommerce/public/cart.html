<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — ShopAura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="logo">Shop<span>Aura</span></a>
    <div class="nav-links">
      <a href="/">Home</a>
      <button id="authBtn" class="btn-outline" onclick="openAuth()">Login</button>
      <a href="/cart.html" class="cart-icon">🛒 <span class="cart-badge" id="cartBadge">0</span></a>
    </div>
  </div>
</nav>

<div class="cart-page">
  <h1 class="page-title">Your Cart</h1>
  <div class="cart-layout">
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-summary" id="cartSummary"></div>
  </div>
</div>

<!-- Checkout Modal -->
<div class="modal-overlay" id="checkoutModal">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('checkoutModal').classList.remove('active')">✕</button>
    <h2>Shipping Details</h2>
    <form onsubmit="placeOrder(event)">
      <div class="form-group"><label>Full Name</label><input type="text" id="shpName" placeholder="John Doe" required /></div>
      <div class="form-group"><label>Phone</label><input type="tel" id="shpPhone" placeholder="9876543210" required /></div>
      <div class="form-group"><label>Street Address</label><input type="text" id="shpStreet" placeholder="123 Main St" required /></div>
      <div class="form-row">
        <div class="form-group"><label>City</label><input type="text" id="shpCity" placeholder="Mumbai" required /></div>
        <div class="form-group"><label>State</label><input type="text" id="shpState" placeholder="Maharashtra" required /></div>
      </div>
      <div class="form-group"><label>Pincode</label><input type="text" id="shpPin" placeholder="400001" required /></div>
      <div class="form-group">
        <label>Payment Method</label>
        <select id="payMethod">
          <option value="COD">Cash on Delivery</option>
          <option value="UPI">UPI</option>
          <option value="Card">Credit/Debit Card</option>
        </select>
      </div>
      <div class="form-msg" id="checkoutMsg"></div>
      <button type="submit" class="btn-primary w-full">Place Order 🎉</button>
    </form>
  </div>
</div>

<div class="modal-overlay" id="authModal">
  <div class="modal">
    <button class="modal-close" onclick="closeAuth()">✕</button>
    <div class="auth-tabs">
      <button class="tab active" id="loginTab" onclick="switchTab('login')">Login</button>
      <button class="tab" id="registerTab" onclick="switchTab('register')">Register</button>
    </div>
    <form id="loginForm" onsubmit="login(event)">
      <h2>Welcome Back</h2>
      <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com" required /></div>
      <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••" required /></div>
      <div class="form-msg" id="loginMsg"></div>
      <button type="submit" class="btn-primary w-full">Login</button>
    </form>
    <form id="registerForm" style="display:none" onsubmit="register(event)">
      <h2>Create Account</h2>
      <div class="form-group"><label>Full Name</label><input type="text" id="regName" placeholder="John Doe" required /></div>
      <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="you@example.com" required /></div>
      <div class="form-group"><label>Password</label><input type="password" id="regPass" placeholder="Min 6 characters" required /></div>
      <div class="form-msg" id="regMsg"></div>
      <button type="submit" class="btn-primary w-full">Create Account</button>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/app.js"></script>
<script>
  function renderCart() {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const itemsEl = document.getElementById('cartItems');
    const summaryEl = document.getElementById('cartSummary');

    if (cart.length === 0) {
      itemsEl.innerHTML = `<div class="empty-cart"><div class="empty-icon">🛒</div><h2>Your cart is empty</h2><a href="/" class="btn-primary">Continue Shopping</a></div>`;
      summaryEl.innerHTML = '';
      return;
    }

    itemsEl.innerHTML = cart.map((item, i) => `
      <div class="cart-item">
        <img src="${item.image}" alt="${item.name}" />
        <div class="ci-info">
          <h3>${item.name}</h3>
          <p class="ci-price">₹${item.price.toLocaleString()}</p>
        </div>
        <div class="ci-qty">
          <button onclick="updateQty(${i}, -1)">−</button>
          <span>${item.quantity}</span>
          <button onclick="updateQty(${i}, 1)">+</button>
        </div>
        <p class="ci-total">₹${(item.price * item.quantity).toLocaleString()}</p>
        <button class="ci-remove" onclick="removeItem(${i})">✕</button>
      </div>
    `).join('');

    const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
    const items = cart.reduce((s, i) => s + i.quantity, 0);
    summaryEl.innerHTML = `
      <div class="summary-box">
        <h2>Order Summary</h2>
        <div class="summary-row"><span>Items (${items})</span><span>₹${total.toLocaleString()}</span></div>
        <div class="summary-row"><span>Shipping</span><span class="free">FREE</span></div>
        <div class="summary-row total"><span>Total</span><span>₹${total.toLocaleString()}</span></div>
        <button class="btn-primary w-full" onclick="checkout()">Proceed to Checkout</button>
        <a href="/" class="continue-shopping">← Continue Shopping</a>
      </div>
    `;
  }

  function updateQty(i, d) {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    cart[i].quantity += d;
    if (cart[i].quantity < 1) cart.splice(i, 1);
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartBadge();
    renderCart();
  }

  function removeItem(i) {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    cart.splice(i, 1);
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartBadge();
    renderCart();
  }

  function checkout() {
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!user) { openAuth(); return; }
    document.getElementById('checkoutModal').classList.add('active');
  }

  async function placeOrder(e) {
    e.preventDefault();
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const msg = document.getElementById('checkoutMsg');
    try {
      const res = await fetch('/api/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${user.token}` },
        body: JSON.stringify({
          items: cart,
          shippingAddress: {
            name: document.getElementById('shpName').value,
            phone: document.getElementById('shpPhone').value,
            street: document.getElementById('shpStreet').value,
            city: document.getElementById('shpCity').value,
            state: document.getElementById('shpState').value,
            pincode: document.getElementById('shpPin').value
          },
          paymentMethod: document.getElementById('payMethod').value
        })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.removeItem('cart');
        updateCartBadge();
        showToast('Order placed successfully! 🎉');
        setTimeout(() => window.location.href = '/orders.html', 1500);
      } else {
        msg.textContent = data.message;
        msg.style.color = 'red';
      }
    } catch (err) {
      msg.textContent = 'Something went wrong';
      msg.style.color = 'red';
    }
  }

  renderCart();
</script>
</body>
</html>
