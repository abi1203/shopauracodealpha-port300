<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — ShopAura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="logo">Shop<span>Aura</span></a>
    <div class="nav-links">
      <a href="/">Home</a>
      <button id="authBtn" class="btn-outline" onclick="openAuth()">Login</button>
      <a href="/cart.html" class="cart-icon">🛒 <span class="cart-badge" id="cartBadge">0</span></a>
    </div>
  </div>
</nav>

<div class="orders-page">
  <h1 class="page-title">My Orders</h1>
  <div id="ordersList"><div class="loading-spinner">Loading orders...</div></div>
</div>

<div class="modal-overlay" id="authModal">
  <div class="modal">
    <button class="modal-close" onclick="closeAuth()">✕</button>
    <div class="auth-tabs">
      <button class="tab active" id="loginTab" onclick="switchTab('login')">Login</button>
      <button class="tab" id="registerTab" onclick="switchTab('register')">Register</button>
    </div>
    <form id="loginForm" onsubmit="login(event)">
      <h2>Welcome Back</h2>
      <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com" required /></div>
      <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••" required /></div>
      <div class="form-msg" id="loginMsg"></div>
      <button type="submit" class="btn-primary w-full">Login</button>
    </form>
    <form id="registerForm" style="display:none" onsubmit="register(event)">
      <h2>Create Account</h2>
      <div class="form-group"><label>Full Name</label><input type="text" id="regName" placeholder="John Doe" required /></div>
      <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="you@example.com" required /></div>
      <div class="form-group"><label>Password</label><input type="password" id="regPass" placeholder="Min 6 characters" required /></div>
      <div class="form-msg" id="regMsg"></div>
      <button type="submit" class="btn-primary w-full">Create Account</button>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/app.js"></script>
<script>
  async function loadOrders() {
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!user) { window.location.href = '/'; return; }
    try {
      const res = await fetch('/api/orders/myorders', {
        headers: { 'Authorization': `Bearer ${user.token}` }
      });
      const orders = await res.json();
      const el = document.getElementById('ordersList');
      if (!orders.length) {
        el.innerHTML = `<div class="empty-cart"><div class="empty-icon">📦</div><h2>No orders yet</h2><a href="/" class="btn-primary">Start Shopping</a></div>`;
        return;
      }
      el.innerHTML = orders.map(o => `
        <div class="order-card">
          <div class="order-header">
            <div>
              <p class="order-id">Order #${o._id.slice(-8).toUpperCase()}</p>
              <p class="order-date">${new Date(o.createdAt).toLocaleDateString('en-IN', {day:'numeric',month:'long',year:'numeric'})}</p>
            </div>
            <div>
              <span class="order-status status-${o.orderStatus.toLowerCase()}">${o.orderStatus}</span>
            </div>
          </div>
          <div class="order-items">
            ${o.items.map(i => `
              <div class="oi-row">
                <img src="${i.image}" alt="${i.name}" />
                <span>${i.name} × ${i.quantity}</span>
                <span>₹${(i.price * i.quantity).toLocaleString()}</span>
              </div>
            `).join('')}
          </div>
          <div class="order-footer">
            <span>Payment: ${o.paymentMethod}</span>
            <span class="order-total">Total: ₹${o.totalAmount.toLocaleString()}</span>
          </div>
        </div>
      `).join('');
    } catch (e) {
      document.getElementById('ordersList').innerHTML = '<p>Failed to load orders.</p>';
    }
  }
  loadOrders();
</script>
</body>
</html>
