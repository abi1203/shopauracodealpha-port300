<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product — ShopAura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="logo">Shop<span>Aura</span></a>
    <div class="nav-links">
      <a href="/">Home</a>
      <button id="authBtn" class="btn-outline" onclick="openAuth()">Login</button>
      <a href="/cart.html" class="cart-icon">🛒 <span class="cart-badge" id="cartBadge">0</span></a>
    </div>
  </div>
</nav>

<div class="product-detail-page">
  <a href="/" class="back-link">← Back to Store</a>
  <div class="product-detail" id="productDetail">
    <div class="loading-spinner">Loading product...</div>
  </div>
</div>

<div class="modal-overlay" id="authModal">
  <div class="modal">
    <button class="modal-close" onclick="closeAuth()">✕</button>
    <div class="auth-tabs">
      <button class="tab active" id="loginTab" onclick="switchTab('login')">Login</button>
      <button class="tab" id="registerTab" onclick="switchTab('register')">Register</button>
    </div>
    <form id="loginForm" onsubmit="login(event)">
      <h2>Welcome Back</h2>
      <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com" required /></div>
      <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••" required /></div>
      <div class="form-msg" id="loginMsg"></div>
      <button type="submit" class="btn-primary w-full">Login</button>
    </form>
    <form id="registerForm" style="display:none" onsubmit="register(event)">
      <h2>Create Account</h2>
      <div class="form-group"><label>Full Name</label><input type="text" id="regName" placeholder="John Doe" required /></div>
      <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="you@example.com" required /></div>
      <div class="form-group"><label>Password</label><input type="password" id="regPass" placeholder="Min 6 characters" required /></div>
      <div class="form-msg" id="regMsg"></div>
      <button type="submit" class="btn-primary w-full">Create Account</button>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/app.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const productId = params.get('id');
  if (!productId) window.location.href = '/';

  async function loadProduct() {
    try {
      const res = await fetch(`/api/products/${productId}`);
      const p = await res.json();
      const stars = '★'.repeat(Math.round(p.rating)) + '☆'.repeat(5 - Math.round(p.rating));
      document.getElementById('productDetail').innerHTML = `
        <div class="pd-left">
          <img src="${p.image}" alt="${p.name}" class="pd-image" />
        </div>
        <div class="pd-right">
          <span class="pd-category">${p.category}</span>
          <h1 class="pd-title">${p.name}</h1>
          <div class="pd-rating">${stars} <span>(${p.reviews ? p.reviews.length : 0} reviews)</span></div>
          <div class="pd-price">₹${p.price.toLocaleString()}</div>
          <p class="pd-desc">${p.description}</p>
          <div class="pd-stock ${p.stock > 0 ? 'in-stock' : 'out-stock'}">${p.stock > 0 ? `✓ In Stock (${p.stock} left)` : '✗ Out of Stock'}</div>
          <div class="pd-qty">
            <label>Quantity:</label>
            <div class="qty-ctrl">
              <button onclick="changeQty(-1)">−</button>
              <span id="qty">1</span>
              <button onclick="changeQty(1)">+</button>
            </div>
          </div>
          <button class="btn-primary pd-cart-btn" onclick="addToCartDetail('${p._id}', '${p.name}', ${p.price}, '${p.image}')" ${p.stock === 0 ? 'disabled' : ''}>
            🛒 Add to Cart
          </button>
        </div>
      `;
    } catch (e) {
      document.getElementById('productDetail').innerHTML = '<p>Product not found.</p>';
    }
  }

  function changeQty(delta) {
    const el = document.getElementById('qty');
    let v = parseInt(el.textContent) + delta;
    if (v < 1) v = 1;
    el.textContent = v;
  }

  function addToCartDetail(id, name, price, image) {
    const qty = parseInt(document.getElementById('qty').textContent);
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const idx = cart.findIndex(i => i.product === id);
    if (idx > -1) cart[idx].quantity += qty;
    else cart.push({ product: id, name, price, image, quantity: qty });
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartBadge();
    showToast('Added to cart!');
  }

  loadProduct();
</script>
</body>
</html>
